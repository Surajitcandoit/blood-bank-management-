<!DOCTYPE html>
<html>
<head>
    <title>Blood Bank Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

<div class="container d-flex justify-content-center">
    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 450px;">
        <h2 class="mb-4">Create Account</h2>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control mb-3" type="text" name="name" placeholder="Full Name or Hospital Name" required>
            <input class="form-control mb-3" type="email" name="email" placeholder="Email Address" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
            
            <select class="form-select mb-4" name="role" required>
                <option value="" disabled selected>Select Account Type...</option>
                <option value="donor">Individual Donor</option>
                <option value="hospital">Hospital</option>
            </select>

            <button class="btn btn-success w-100 mb-2" type="submit">Register</button>
            <a href="/" class="btn btn-outline-secondary w-100">Back to Login</a>
        </form>

        {% if error %}
            <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}
    </div>
</div>

</body>
</html>
