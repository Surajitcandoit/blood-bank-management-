<!DOCTYPE html>
<html>
<head>
    <title>Blood Bank Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h2>Login</h2>

        <form method="POST">
            {% csrf_token %}

            <input
                class="form-control mb-3"
                type="email"
                name="email"
                placeholder="Email"
            >

            <input
                class="form-control mb-3"
                type="password"
                name="password"
                placeholder="Password"
            >

            <button
                class="btn btn-primary"
                type="submit"
            >
                Login
            </button>

        </form>

        {% if error %}
            <div class="alert alert-danger mt-3">
                {{ error }}
            </div>
        {% endif %}

    </div>

</div>

</body>
</html>
